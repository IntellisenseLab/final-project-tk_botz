<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ROS2 Humble - Same Laptop Test</title>
  <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #status { font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>ROS 2 Humble Web Connection (Same Laptop)</h1>
  <p id="status">Connecting to rosbridge...</p>
  <h3>Messages from /chatter:</h3>
  <div id="messages" style="background:#f4f4f4; padding:10px; height:300px; overflow-y:scroll;"></div>

  <script>
    // Connect to rosbridge on localhost
    const ros = new ROSLIB.Ros({
      url: 'ws://localhost:9090'
    });

    ros.on('connection', () => {
      document.getElementById('status').innerHTML = '✅ Successfully Connected to ROS 2!';
      console.log('Connected to ROS');
    });

    ros.on('error', (error) => {
      document.getElementById('status').innerHTML = '❌ Connection Error - Check if rosbridge is running';
      console.error(error);
    });

    ros.on('close', () => {
      document.getElementById('status').innerHTML = '❌ Disconnected';
    });

    // Subscribe to /chatter topic
    const listener = new ROSLIB.Topic({
      ros: ros,
      name: '/chatter',
      messageType: 'std_msgs/msg/String'
    });

    listener.subscribe((message) => {
      const msgDiv = document.getElementById('messages');
      msgDiv.innerHTML += `<p>→ ${message.data}</p>`;
      msgDiv.scrollTop = msgDiv.scrollHeight;
    });
  </script>
</body>
</html>

# SLAM Toolbox async mode configuration
# Async mode allows the mapping to happen in a separate thread

# Plugin params
solver_plugin: solver_plugins::CeresSolver
ceres_linear_solver_type: SPARSE_NORMAL_CHOLESKY
ceres_preconditioner_type: SCHUR_JACOBI
ceres_trust_strategy: LEVENBERG_MARQUARDT
ceres_dogleg_type: TRADITIONAL_DOGLEG
ceres_loss_function: HuberLoss

# ROS Parameters
odom_frame: odom
map_frame: map
base_frame: base_link
scan_topic: /scan
odom_topic: /odometry/filtered

# Maximum number of threads
num_multi_resolution_grids: 1
num_threads: 4

# Map size and resolution
resolution: 0.05
max_laser_range: 6.0
minimum_travel_heading: 0.2
minimum_travel_distance: 0.5
map_start_pose: [0.0, 0.0, 0.0]
map_start_at_dock: true

# Loop closure
loop_search_max_distance: 3.0
do_loop_closing: true
loop_match_minimum_chain_size: 10
do_rollback: true
rollback_poses_distance: 0.15

# Scan matcher
correlation_search_space_dimension: 0.5
correlation_search_space_resolution: 0.01
correlation_search_space_smear_deviation: 0.1

# Hough transform setup
do_hough_correlation_search: false

# Fine matcher
use_scan_matching: true
use_scan_bagging: true
minimum_score_for_scan_matching: 0.42
minimum_score_for_loop_closure: 0.35

# Matcher pose prediction
scan_buffer_size: 10
scan_buffer_max_scan_distance: 15.0
link_match_minimum_response_fine: 0.10
link_scan_maximum_distance: 1.5
maximum_scan_projection_range: 3.0
chain_search_maximum_chain_size: 16
chain_search_maximum_variance: 5.0
chain_search_maximum_distance: 5.0
chain_search_count: 25

# Occupancy grid parameters
resolution_occupancy_grid: 0.05
occupancy_grid_mode: OccupancyGridMode_ 2D

# Publish settings
publish_pose_graph: false
publish_debug_message: false
debug_logging: false
throttle_scans: 1
transform_publish_period: 0.02

# Motion model
use_motion_model_for_scan_matching: false
motion_model_variance: 0.1
